services:
  hd-api:
    build: .
    container_name: hd-django-api
    command: >
      sh -c "
        python manage.py collectstatic --noinput &&
        python manage.py makemigrations && 
        python manage.py migrate --noinput && 
        python manage.py createsuperuser --noinput || true &&
        python manage.py fill_districts  || true &&
        python manage.py fill_renovation_types  || true &&
        gunicorn core.project.wsgi:application --bind 0.0.0.0:8000 --reload
      "
    env_file:
      - .env
    volumes:
      - ./:/app/
    ports:
      - "8000:8000"
    depends_on:
      hd-postgres:
        condition: service_healthy

  hd-postgres:
    image: postgres:16
    container_name: hd-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  worker:
    build: .
    command: celery -A core.project:celery_app worker -l INFO
    depends_on:
      - redis
    env_file:
      - .env
  beat:
    build: .
    command: celery -A core.project:celery_app beat -l INFO
    depends_on:
      - redis
    env_file:
      - .env

volumes:
  pg_data:
  redis_data:
