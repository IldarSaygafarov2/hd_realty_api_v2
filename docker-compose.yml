services:
  hd-api:
    build: .
    container_name: hd-django-api
    command: sh -c "python manage.py makemigrations && python manage.py migrate && gunicorn core.project.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env
    volumes:
      - ./:/app/
    ports:
      - "8000:8000"

  hd-postgres:
    image: postgres:16
    container_name: hd-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
